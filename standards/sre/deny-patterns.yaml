# Deny Patterns — SRE / Infrastructure
#
# Hard blocks on dangerous operations. More restrictive than developer sets —
# includes infrastructure-specific blocks.
#
# Translate to your agent's native format:
#   - Claude Code: setup.sh converts to ~/.claude/settings.json automatically
#   - Cursor: Add to .cursorignore or Cursor settings
#   - Other tools: Consult your tool's documentation
#
# Categories: file-read (block reading sensitive files), command (block dangerous commands)
#
# NOTE: env/printenv are covered in safety-baseline rules (soft guidance)
# rather than here, because `env VAR=x cmd` is a legitimate use of `env`.

file-read:
  # Environment / secret files
  - ".env"
  - "**/.env"
  - ".env.local"
  - ".env.production"
  - "**/.env.local"
  - "**/.env.production"
  # Credential files
  - "~/.aws/credentials"
  - "~/.ssh/id_rsa"
  - "~/.ssh/id_ed25519"
  - "~/.kube/config"
  - "~/.vault-token"
  - "~/.docker/config.json"
  - "~/.npmrc"
  - "~/.config/gcloud/application_default_credentials.json"
  - "~/.azure/accessTokens.json"
  - "~/.pulumi/credentials.json"
  # Key and state files
  - "**/*.pem"
  - "**/*.key"
  - "**/*.tfstate"
  - "**/*.tfstate.backup"
  # WSO2-specific sensitive files
  - "**/deployment.toml"
  - "**/master-keys.yaml"
  - "**/cipher-text.properties"
  - "**/secret-conf.properties"
  - "**/*.jks"
  - "**/*.p12"

command:
  # Destructive infrastructure commands
  - "terraform destroy *"
  - "terraform destroy"
  - "terraform apply -auto-approve *"
  - "terraform apply -auto-approve"
  - "terraform force-unlock *"
  - "kubectl delete namespace *"
  - "kubectl delete ns *"
  - "aws rds delete-db-instance *"
  - "aws ec2 terminate-instances *"
  - "aws s3 rb *"
  - "aws ec2 delete-vpc *"
  - "aws kms schedule-key-deletion *"
  - "aws route53 delete-hosted-zone *"
  - "rm -rf /"
  - "rm -rf /*"
